name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          TURSO_DATABASE_URL: ':memory:'
          TURSO_AUTH_TOKEN: ''
          BETTER_AUTH_URL: 'http://localhost:3000'
          BETTER_AUTH_SECRET: 'ci-secret-key-at-least-32-characters-long'
